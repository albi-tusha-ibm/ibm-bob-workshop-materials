---
- name: Configure Database Servers
  hosts: database_servers
  become: yes
  vars:
    postgres_version: "15"
    postgres_data_dir: /var/lib/pgsql/15/data
    postgres_port: 5432
    max_connections: 200
    shared_buffers: "4GB"
    effective_cache_size: "12GB"
    
  tasks:
    - name: Install PostgreSQL repository
      yum:
        name: https://download.postgresql.org/pub/repos/yum/reporpms/EL-7-x86_64/pgdg-redhat-repo-latest.noarch.rpm
        state: present
      tags: [postgres, repo]
    
    - name: Install PostgreSQL
      yum:
        name:
          - postgresql{{ postgres_version }}
          - postgresql{{ postgres_version }}-server
          - postgresql{{ postgres_version }}-contrib
          - python3-psycopg2
        state: present
      tags: [postgres, packages]
    
    - name: Initialize PostgreSQL database
      command: /usr/pgsql-{{ postgres_version }}/bin/postgresql-{{ postgres_version }}-setup initdb
      args:
        creates: "{{ postgres_data_dir }}/PG_VERSION"
      tags: [postgres, init]
    
    - name: Configure PostgreSQL
      template:
        src: ../templates/postgresql.conf.j2
        dest: "{{ postgres_data_dir }}/postgresql.conf"
        owner: postgres
        group: postgres
        mode: '0600'
      notify: restart postgresql
      tags: [postgres, config]
    
    - name: Configure pg_hba.conf
      template:
        src: ../templates/pg_hba.conf.j2
        dest: "{{ postgres_data_dir }}/pg_hba.conf"
        owner: postgres
        group: postgres
        mode: '0600'
      notify: restart postgresql
      tags: [postgres, config]
    
    - name: Enable and start PostgreSQL
      systemd:
        name: postgresql-{{ postgres_version }}
        enabled: yes
        state: started
      tags: [postgres, services]
    
    - name: Create application database
      postgresql_db:
        name: globaltech
        encoding: UTF-8
        lc_collate: en_US.UTF-8
        lc_ctype: en_US.UTF-8
        template: template0
      become_user: postgres
      tags: [postgres, database]
    
    - name: Create application user
      postgresql_user:
        name: app_user
        password: "{{ db_password }}"
        db: globaltech
        priv: ALL
      become_user: postgres
      tags: [postgres, users]
    
    - name: Configure backup script
      template:
        src: ../templates/pg_backup.sh.j2
        dest: /usr/local/bin/pg_backup.sh
        owner: postgres
        group: postgres
        mode: '0750'
      tags: [postgres, backup]
    
    - name: Schedule database backups
      cron:
        name: "PostgreSQL backup"
        minute: "0"
        hour: "2"
        job: "/usr/local/bin/pg_backup.sh"
        user: postgres
      tags: [postgres, backup, cron]
  
  handlers:
    - name: restart postgresql
      systemd:
        name: postgresql-{{ postgres_version }}
        state: restarted
