apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        version: v1.8.2
    spec:
      containers:
      - name: inventory-service
        image: techmart/inventory-service:1.8.2
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "4Gi"
            cpu: "1000m"
