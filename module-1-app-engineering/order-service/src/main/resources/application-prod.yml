# Production configuration overrides

spring:
  datasource:
    url: jdbc:postgresql://orders-db.prod.internal:5432/orders_db
    username: orders_prod_user
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        generate_statistics: false
        jdbc:
          batch_size: 50
  
  kafka:
    bootstrap-servers: kafka-1.prod.internal:9092,kafka-2.prod.internal:9092,kafka-3.prod.internal:9092
    producer:
      acks: all
      retries: 5
      properties:
        linger.ms: 5
        batch.size: 32768
        compression.type: lz4
        max.in.flight.requests.per.connection: 5
        enable.idempotence: true
    consumer:
      properties:
        max.poll.records: 500
        max.poll.interval.ms: 600000
        session.timeout.ms: 45000
        fetch.min.bytes: 1024
        fetch.max.wait.ms: 500

server:
  port: 8080
  tomcat:
    threads:
      max: 400
      min-spare: 50
    connection-timeout: 30000
    max-connections: 20000
    accept-count: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    com.enterprise.orders: INFO
    org.springframework.web: WARN
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/order-service/order-service.log
    max-size: 500MB
    max-history: 60

# Production-specific settings
order:
  cache:
    enabled: true
    max-size: 50000
    ttl-minutes: 30
  validation:
    timeout-seconds: 60
  events:
    enabled: true

